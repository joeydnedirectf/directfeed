<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DirectFeed Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* RESET & BODY */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { display:flex; background:#f5f6fa; color:#333; }

/* SIDEBAR */
.sidebar {
  position:fixed;
  left:0; top:0;
  height:100%;
  width:240px;
  background:#2f3640;
  color:white;
  display:flex; flex-direction:column;
  transition:width 0.3s;
  box-shadow:2px 0 5px rgba(0,0,0,0.1);
}
.sidebar.collapsed { width:70px; }
.sidebar .logo { font-size:24px; font-weight:bold; text-align:center; padding:20px 0; border-bottom:1px solid #444; }
.sidebar button {
  display:flex; align-items:center; width:100%; padding:15px 20px;
  border:none; background:none; color:white; cursor:pointer; text-align:left;
  font-size:16px; transition:0.2s;
}
.sidebar button i { width:25px; margin-right:10px; text-align:center; font-style:normal; }
.sidebar button.active, .sidebar button:hover { background:#353b48; }
.toggleBtn { background:#353b48; font-size:18px; }

/* TOPBAR */
.topRight {
  position:fixed; top:15px; right:20px; text-align:right;
  display:flex; align-items:center; gap:8px;
}
.topRight span { font-weight:bold; }
.topRight button {
  padding:6px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
}
#logoutBtn { background:#e84118; color:white; }
#settingsBtn { background:#718093; color:white; }

/* CONTENT */
.content { margin-left:240px; flex:1; padding:25px; transition:margin-left 0.3s; }
h2 { margin-bottom:20px; color:#2f3640; }

/* MESSAGE ROWS */
.messageRow {
  background:white; padding:15px; margin-bottom:12px; border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.05); cursor:pointer;
  transition:transform 0.15s;
}
.messageRow:hover { transform:scale(1.01); }
.fullMessage { background:white; padding:20px; border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
.deleteBtn { background:#e84118; color:white; border:none; padding:10px 15px; margin-top:12px; cursor:pointer; border-radius:6px; }

/* SEND BUTTON */
.sendBtn { position:fixed; bottom:60px; right:25px; background:#00a8ff; color:white; border:none; padding:16px 24px; border-radius:50px; cursor:pointer; box-shadow:0 3px 6px rgba(0,0,0,0.2); font-size:16px; }

/* SEND MODAL */
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
.modalContent { background:white; padding:25px; border-radius:12px; width:360px; max-width:90%; }
.modalContent input, .modalContent textarea { width:100%; padding:8px; border:1px solid #ccc; border-radius:6px; margin-bottom:12px; }
.modalContent button { padding:10px 16px; border:none; border-radius:6px; cursor:pointer; }
#sendButton { background:#00a8ff; color:white; margin-right:8px; }
#cancelSendBtn { background:#718093; color:white; }
#sendModalStatus { margin-top:8px; font-size:14px; }

/* SMALL TEXT */
small { color:#718093; display:block; margin-top:6px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="logo">DirectFeed</div>
  <button class="toggleBtn" onclick="toggleSidebar()">☰</button>
  <button id="navInbox"><i>📥</i><span class="label">Inbox</span></button>
  <button id="navTrash"><i>🗑️</i><span class="label">Trash</span></button>
  <button id="navSend"><i>✉️</i><span class="label">Send</span></button>
  <button id="navSettings"><i>⚙️</i><span class="label">Settings</span></button>
</div>

<!-- CONTENT -->
<div class="content" id="content"></div>

<!-- TOP RIGHT -->
<div class="topRight">
  <span>Welcome, <span id="userDisplay"></span></span>
  <button id="settingsBtn">Settings</button>
  <button id="logoutBtn">Logout</button>
</div>

<!-- SEND MODAL -->
<div class="modal" id="sendModal">
  <div class="modalContent">
    <h3>Send Message</h3>
    <input id="recipient" placeholder="Recipient username">
    <textarea id="messageText" maxlength="200" placeholder="Message (200 max)"></textarea>
    <div style="display:flex; justify-content:flex-end; gap:8px;">
      <button id="sendButton">Send</button>
      <button id="cancelSendBtn">Cancel</button>
    </div>
    <div id="sendModalStatus"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyCnE-UOw56IASUOU_qwBcF5YsBOOml9BRY",
  authDomain:"directfeed-c3084.firebaseapp.com",
  projectId:"directfeed-c3084",
  storageBucket:"directfeed-c3084.firebasestorage.app",
  messagingSenderId:"780676224282",
  appId:"1:780676224282:web:8580ee6c3aa1738394c8a3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* SESSION LOGIN */
let username = sessionStorage.getItem("loggedInUser");
if(!username) window.location.href="login.html";
document.getElementById("userDisplay").textContent=username;

/* LOGOUT */
document.getElementById("logoutBtn").onclick=()=>{ sessionStorage.removeItem("loggedInUser"); window.location.href="login.html"; }

/* NAVIGATION */
function openSettings(){ window.location.href="settings.html"; }
document.getElementById("settingsBtn").onclick=openSettings;
document.getElementById("navSettings").onclick=openSettings;

/* SIDEBAR TOGGLE */
function toggleSidebar(){
  const sb=document.getElementById("sidebar");
  sb.classList.toggle("collapsed");
  document.querySelector(".content").style.marginLeft=sb.classList.contains("collapsed")?"70px":"240px";
}

/* NAV HIGHLIGHT */
function highlightNav(id){
  ["navInbox","navTrash","navSend","navSettings"].forEach(b=>document.getElementById(b).classList.remove("active"));
  const el=document.getElementById(id);
  if(el) el.classList.add("active");
}

const content=document.getElementById("content");

/* INBOX */
async function loadInbox(){
  highlightNav("navInbox");
  content.innerHTML="<h2>Inbox</h2>";
  const q=query(collection(db,"messages"), where("to","==",username), where("deleted","==",false));
  const snap=await getDocs(q);
  if(snap.empty){ content.innerHTML+="<p>No messages.</p>"; return; }
  snap.forEach(docu=>{
    const data=docu.data();
    const row=document.createElement("div");
    row.className="messageRow";
    const date=new Date(data.timestamp).toLocaleString();
    row.innerHTML=`<b>From:</b> ${data.from}<br>${data.text.substring(0,60)}<br><small>${date}</small>`;
    row.onclick=()=>openMessage(docu.id,data);
    content.appendChild(row);
  });
}

/* OPEN MESSAGE */
async function openMessage(id,data){
  content.innerHTML="";
  const box=document.createElement("div");
  box.className="fullMessage";
  const date=new Date(data.timestamp).toLocaleString();
  box.innerHTML=`<h3>From: ${data.from}</h3><p>${data.text}</p><small>Sent: ${date}</small>`;
  const del=document.createElement("button");
  del.className="deleteBtn";
  del.textContent="Delete";
  del.onclick=async()=>{ await updateDoc(doc(db,"messages",id),{deleted:true}); loadInbox(); }
  box.appendChild(del);
  content.appendChild(box);
}

/* TRASH */
async function loadTrash(){
  highlightNav("navTrash");
  content.innerHTML="<h2>Trash</h2>";
  const q=query(collection(db,"messages"), where("to","==",username), where("deleted","==",true));
  const snap=await getDocs(q);
  if(snap.empty){ content.innerHTML+="<p>No messages in Trash.</p>"; return; }
  snap.forEach(docu=>{
    const data=docu.data();
    const row=document.createElement("div");
    row.className="messageRow";
    const date=new Date(data.timestamp).toLocaleString();
    row.innerHTML=`<b>From:</b> ${data.from}<br>${data.text.substring(0,60)}<br><small>${date}</small>`;
    row.onclick=()=>openTrash(docu.id,data);
    content.appendChild(row);
  });
}

/* OPEN TRASH */
async function openTrash(id,data){
  content.innerHTML="";
  const box=document.createElement("div");
  box.className="fullMessage";
  const date=new Date(data.timestamp).toLocaleString();
  box.innerHTML=`<h3>From: ${data.from}</h3><p>${data.text}</p><small>Sent: ${date}</small>`;
  
  const restoreBtn=document.createElement("button");
  restoreBtn.className="deleteBtn";
  restoreBtn.style.background="green";
  restoreBtn.textContent="Restore to Inbox";
  restoreBtn.onclick=async()=>{ await updateDoc(doc(db,"messages",id),{deleted:false}); loadTrash(); }

  const del=document.createElement("button");
  del.className="deleteBtn";
  del.style.background="black";
  del.textContent="Delete Permanently";
  del.onclick=async()=>{ await deleteDoc(doc(db,"messages",id)); loadTrash(); }

  box.appendChild(restoreBtn);
  box.appendChild(del);
  content.appendChild(box);
}

/* SEND MODAL */
function openSend(){ const modal=document.getElementById("sendModal"); if(modal) modal.style.display="flex"; highlightNav("navSend"); }
function closeSend(){ const modal=document.getElementById("sendModal"); if(modal) modal.style.display="none"; document.getElementById("sendModalStatus").textContent=""; }

/* SEND MESSAGE */
async function sendMessage(){
  const recipient=document.getElementById("recipient").value.trim();
  const text=document.getElementById("messageText").value.trim();
  const status=document.getElementById("sendModalStatus");
  if(!recipient||!text){ status.textContent="Recipient and message required"; status.style.color="red"; return; }
  try{
    const userSnap=await getDoc(doc(db,"users",recipient));
    if(!userSnap.exists()){ status.textContent="Recipient does not exist"; status.style.color="red"; return; }
    await addDoc(collection(db,"messages"),{from:username,to:recipient,text:text,deleted:false,timestamp:Date.now()});
    status.textContent="Message sent!";
    status.style.color="green";
    document.getElementById("recipient").value="";
    document.getElementById("messageText").value="";
    closeSend();
    loadInbox();
  }catch(err){ console.error(err); status.textContent="Error sending message"; status.style.color="red"; }
}

document.getElementById("sendButton")?.addEventListener("click",sendMessage);
document.getElementById("cancelSendBtn")?.addEventListener("click",closeSend);

/* NAV BUTTONS */
document.getElementById("navInbox").onclick=loadInbox;
document.getElementById("navTrash").onclick=loadTrash;
document.getElementById("navSend").onclick=openSend;

/* INITIAL LOAD */
loadInbox();
</script>
</body>
</html>
