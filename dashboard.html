<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f0f0f0;
}

.top-right{
position:absolute;
top:20px;
right:20px;
text-align:right;
}

button{
margin-top:8px;
padding:8px 16px;
border:none;
border-radius:4px;
background:#007bff;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="top-right">
Welcome, <span id="user"></span><br>
<button id="logout">Logout</button>
</div>

<script>

const username=sessionStorage.getItem("loggedInUser");

if(!username){
window.location.href="login.html";
}

document.getElementById("user").textContent=username;

document.getElementById("logout").onclick=()=>{
sessionStorage.removeItem("loggedInUser");
window.location.href="login.html";
}

</script>

</body>
</html>
