<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f0f0f0;
display:flex;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:0;
top:0;
height:100%;
width:240px;
background:#1a1a1a;
color:white;
display:flex;
flex-direction:column;
}

.sidebar button{
padding:15px;
border:none;
background:none;
color:white;
cursor:pointer;
text-align:left;
font-size:16px;
}

.sidebar button:hover{
background:#333;
}

/* CONTENT */

.content{
margin-left:240px;
padding:20px;
flex:1;
}

/* TOP RIGHT BAR */

.topRight{
position:fixed;
top:15px;
right:20px;
}

.topRight button{
margin-left:6px;
padding:6px 12px;
border:none;
border-radius:4px;
cursor:pointer;
}

#logoutBtn{
background:#007bff;
color:white;
}

/* MESSAGE ROW */

.messageRow{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:6px;
cursor:pointer;
border:1px solid #ddd;
}

.messageRow:hover{
background:#f7f7f7;
}

/* FULL MESSAGE */

.fullMessage{
background:white;
padding:20px;
border-radius:6px;
border:1px solid #ddd;
}

.deleteBtn{
background:red;
color:white;
border:none;
padding:10px;
margin-top:10px;
cursor:pointer;
}

/* SEND BUTTON */

.sendBtn{
position:fixed;
bottom:60px;
right:20px;
background:#007bff;
color:white;
border:none;
padding:16px 22px;
border-radius:50px;
cursor:pointer;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modalContent{
background:white;
padding:20px;
border-radius:8px;
width:320px;
}

textarea{
width:100%;
height:80px;
}

input{
width:100%;
padding:6px;
}

</style>
</head>


<body>

<!-- USER BAR -->

<div class="topRight">
User: <span id="userDisplay"></span>
<button id="logoutBtn">Logout</button>
</div>


<!-- SIDEBAR -->

<div class="sidebar">

<button id="navInbox">Inbox</button>
<button id="navTrash">Trash</button>
<button onclick="openSend()">Send</button>
<button onclick="openSettings()">Settings</button>

</div>


<!-- CONTENT -->

<div class="content" id="content"></div>

<button class="sendBtn" onclick="openSend()">Send</button>


<!-- SEND MODAL -->

<div class="modal" id="sendModal">

<div class="modalContent">

<h3>Send Message</h3>

<input id="recipient" placeholder="Recipient username">

<br><br>

<textarea id="messageText" maxlength="200" placeholder="Message (200 max)"></textarea>

<br><br>

<button id="sendButton">Send</button>
<button id="cancelSendBtn">Cancel</button>

<div id="sendModalStatus" style="margin-top:10px;font-size:14px;"></div>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
where,
doc,
updateDoc,
deleteDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";


const firebaseConfig = {

apiKey:"AIzaSyCnE-UOw56IASUOU_qwBcF5YsBOOml9BRY",
authDomain:"directfeed-c3084.firebaseapp.com",
projectId:"directfeed-c3084"

};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


/* LOGIN SESSION */

let username = sessionStorage.getItem("loggedInUser");

if(!username){
window.location.href="login.html";
}

document.getElementById("userDisplay").textContent = username;


/* LOGOUT */

document.getElementById("logoutBtn").onclick = ()=>{
sessionStorage.removeItem("loggedInUser");
window.location.href="login.html";
};


/* SETTINGS PAGE */

function openSettings(){
window.location.href="settings.html";
}

window.openSettings = openSettings;


/* CONTENT AREA */

const content=document.getElementById("content");


/* LOAD INBOX */

async function loadInbox(){

content.innerHTML="<h2>Inbox</h2>";

const q=query(
collection(db,"messages"),
where("to","==",username),
where("deleted","==",false)
);

const snap=await getDocs(q);

if(snap.empty){
content.innerHTML+="<p>No messages.</p>";
}

snap.forEach(docu=>{

const data=docu.data();

const row=document.createElement("div");

row.className="messageRow";

row.innerHTML="<b>From:</b> "+data.from+"<br>"+data.text.substring(0,60);

row.onclick=()=>openMessage(docu.id,data);

content.appendChild(row);

});

}


/* OPEN MESSAGE */

function openMessage(id,data){

content.innerHTML="";

const box=document.createElement("div");

box.className="fullMessage";

box.innerHTML="<h3>From: "+data.from+"</h3><p>"+data.text+"</p>";

const del=document.createElement("button");

del.className="deleteBtn";

del.textContent="Delete";

del.onclick=async()=>{

await updateDoc(doc(db,"messages",id),{deleted:true});

loadInbox();

};

box.appendChild(del);

content.appendChild(box);

}


/* TRASH */

async function loadTrash(){

content.innerHTML="<h2>Trash</h2>";

const q=query(
collection(db,"messages"),
where("to","==",username),
where("deleted","==",true)
);

const snap=await getDocs(q);

snap.forEach(docu=>{

const data=docu.data();

const row=document.createElement("div");

row.className="messageRow";

row.innerHTML="<b>From:</b> "+data.from+"<br>"+data.text;

row.onclick=async()=>{

await deleteDoc(doc(db,"messages",docu.id));

loadTrash();

};

content.appendChild(row);

});

}


/* SEND MESSAGE */

async function sendMessage(){

const recipient=document.getElementById("recipient").value.trim();

const text=document.getElementById("messageText").value.trim();

const status=document.getElementById("sendModalStatus");

if(text.length===0){
status.textContent="Message cannot be empty";
status.style.color="red";
return;
}

if(text.length>200){
status.textContent="Max 200 characters";
status.style.color="red";
return;
}

try{

const userDocSnap=await getDoc(doc(db,"users",recipient));

if(!userDocSnap.exists()){
status.textContent="Recipient does not exist";
status.style.color="red";
return;
}

await addDoc(collection(db,"messages"),{

from:username,
to:recipient,
text:text,
deleted:false,
timestamp:Date.now()

});

status.textContent="Message sent!";
status.style.color="green";

document.getElementById("recipient").value="";
document.getElementById("messageText").value="";

closeSend();

loadInbox();

}

catch(err){

console.error(err);

status.textContent="Error sending message";
status.style.color="red";

}

}


/* MODAL */

function openSend(){
document.getElementById("sendModal").style.display="flex";
}

function closeSend(){
document.getElementById("sendModal").style.display="none";
document.getElementById("sendModalStatus").textContent="";
}


/* BUTTONS */

document.getElementById("sendButton").addEventListener("click",sendMessage);

document.getElementById("cancelSendBtn").addEventListener("click",closeSend);

document.getElementById("navInbox").onclick=loadInbox;

document.getElementById("navTrash").onclick=loadTrash;


/* START */

loadInbox();

</script>

</body>
</html>
