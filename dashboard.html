<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - DirectFeed</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
  <style>
    body { font-family: Arial; background:#f5f5f5; margin:0; }
    header { background:#0070f3; color:white; padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; }
    header h1 { margin:0; font-size:1.5rem; }
    header button { background:white; color:#0070f3; border:none; padding:0.5rem 1rem; border-radius:4px; cursor:pointer; font-weight:bold;}
    main { padding:2rem; }
    .welcome { font-size:1.2rem; margin-bottom:1rem; }
  </style>
</head>
<body>

<header>
  <h1>DirectFeed Dashboard</h1>
  <button onclick="logout()">Logout</button>
</header>

<main>
  <div class="welcome" id="welcomeText">
    Loading your tag...
  </div>
  <p>More features will be added as the project develops.</p>
</main>

<script>
  const supabaseUrl = 'https://bevymbmfaxpfplcoiuno.supabase.co';
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJldnltYm1mYXhwZnBsY29pdW5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NTY2MTksImV4cCI6MjA4OTAzMjYxOX0.Gf8VZ08-B3XlEfyE5PBJhmkIxXYZ6ONC4bdSSUV-HLI';
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  // Display saved tag
  const userTag = localStorage.getItem('userTag');
  if(userTag){
    document.getElementById('welcomeText').textContent = `Welcome, ${userTag}!`;
  } else {
    // No tag saved → redirect to login
    window.location.href = 'login.html';
  }

  function logout() {
    supabase.auth.signOut();
    localStorage.removeItem('userTag');
    window.location.href = 'login.html';
  }
</script>

</body>
</html>
