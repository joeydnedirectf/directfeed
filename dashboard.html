<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f0f0f0;
}

/* Top-right user display */
.topRight {
  position: fixed;
  top: 15px;
  right: 20px;
  text-align: right;
}

.topRight button {
  margin-top: 5px;
  padding: 6px 10px;
  background: #007bff;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 4px;
}

/* Sidebar */
.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  height: 100%;
  width: 220px;
  background: #222;
  color: white;
  padding-top: 20px;
  transition: 0.3s;
}

.sidebar button {
  display: block;
  width: 100%;
  padding: 12px;
  border: none;
  background: none;
  color: white;
  text-align: left;
  cursor: pointer;
}

.sidebar button:hover {
  background: #444;
}

.closeBtn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #444;
  padding: 5px 10px;
  border: none;
  color: white;
  cursor: pointer;
}

/* Content */
.content {
  margin-left: 220px;
  padding: 20px;
}

/* Message rows */
.messageRow {
  background: white;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 6px;
  cursor: pointer;
  border: 1px solid #ddd;
}

.messageRow:hover {
  background: #f7f7f7;
}

.fullMessage {
  background: white;
  padding: 20px;
  border-radius: 6px;
  border: 1px solid #ddd;
}

/* Delete buttons */
.deleteBtn {
  background: red;
  color: white;
  border: none;
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
}

.permDelete {
  background: black;
  color: white;
  border: none;
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
}

/* Send button */
.sendBtn {
  position: fixed;
  bottom: 60px;
  right: 20px;
  background: #007bff;
  color: white;
  border: none;
  padding: 16px 22px;
  border-radius: 50px;
  cursor: pointer;
}

/* Send status (below send button) */
#sendStatus {
  position: fixed;
  bottom: 20px;
  right: 20px;
  font-size: 14px;
}

/* Send modal */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}

.modalContent {
  background: white;
  padding: 20px;
  border-radius: 8px;
  width: 320px;
}

textarea {
  width: 100%;
  height: 80px;
}
</style>
</head>
<body>

<!-- TOP RIGHT USER -->
<div class="topRight">
  <div>Welcome, <span id="userDisplay"></span></div>
  <button id="logoutBtn">Logout</button>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <button class="closeBtn" onclick="toggleNav()">☰</button>
  <button onclick="loadInbox()">Inbox</button>
  <button onclick="loadTrash()">Trash</button>
</div>

<!-- MAIN CONTENT -->
<div class="content" id="content"></div>

<!-- SEND BUTTON -->
<button class="sendBtn" onclick="openSend()">Send</button>
<div id="sendStatus"></div>

<!-- SEND MODAL -->
<div class="modal" id="sendModal">
  <div class="modalContent">
    <h3>Send Message</h3>
    <input id="recipient" placeholder="Recipient username"><br><br>
    <textarea id="messageText" maxlength="200" placeholder="Message (200 max)"></textarea>
    <br><br>
    <button onclick="sendMessage()">Send</button>
    <button onclick="closeSend()">Cancel</button>
    <div id="sendModalStatus" style="margin-top:10px;font-size:14px;"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyCnE-UOw56IASUOU_qwBcF5YsBOOml9BRY",
  authDomain:"directfeed-c3084.firebaseapp.com",
  projectId:"directfeed-c3084",
  storageBucket:"directfeed-c3084.firebasestorage.app",
  messagingSenderId:"780676224282",
  appId:"1:780676224282:web:8580ee6c3aa1738394c8a3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* USER */
const username = sessionStorage.getItem("loggedInUser");
if(!username) window.location.href = "login.html";
document.getElementById("userDisplay").textContent = username;

/* LOGOUT */
document.getElementById("logoutBtn").onclick = ()=>{
  sessionStorage.removeItem("loggedInUser");
  window.location.href = "login.html";
}

const content = document.getElementById("content");

/* SIDEBAR */
window.toggleNav = ()=>{
  const nav = document.getElementById("sidebar");
  nav.style.width = nav.style.width==="0px"?"220px":"0px";
}

/* INBOX */
window.loadInbox = async ()=>{
  content.innerHTML = "<h2>Inbox</h2>";
  const q = query(collection(db,"messages"),
                  where("to","==",username),
                  where("deleted","==",false));
  const snap = await getDocs(q);
  snap.forEach(docu=>{
    const data = docu.data();
    const row = document.createElement("div");
    row.className = "messageRow";
    row.innerHTML = "<b>From:</b> "+data.from+"<br>"+data.text.substring(0,60);
    row.onclick = ()=>openMessage(docu.id,data);
    content.appendChild(row);
  });
}

/* OPEN MESSAGE */
async function openMessage(id,data){
  content.innerHTML="";
  const box = document.createElement("div");
  box.className="fullMessage";
  box.innerHTML = "<h3>From: "+data.from+"</h3><p>"+data.text+"</p>";
  const del = document.createElement("button");
  del.className="deleteBtn";
  del.textContent = "Delete";
  del.onclick = async()=>{
    await updateDoc(doc(db,"messages",id),{deleted:true});
    loadInbox();
  }
  box.appendChild(del);
  content.appendChild(box);
}

/* TRASH */
window.loadTrash = async ()=>{
  content.innerHTML = "<h2>Trash</h2>";
  const q = query(collection(db,"messages"),
                  where("to","==",username),
                  where("deleted","==",true));
  const snap = await getDocs(q);
  snap.forEach(docu=>{
    const data = docu.data();
    const row = document.createElement("div");
    row.className = "messageRow";
    row.innerHTML = "<b>From:</b> "+data.from+"<br>"+data.text.substring(0,60);
    row.onclick = ()=>openTrash(docu.id,data);
    content.appendChild(row);
  });
}

/* OPEN TRASH */
async function openTrash(id,data){
  content.innerHTML="";
  const box = document.createElement("div");
  box.className="fullMessage";
  box.innerHTML = "<h3>From: "+data.from+"</h3><p>"+data.text+"</p>";
  const del = document.createElement("button");
  del.className="permDelete";
  del.textContent = "Delete Permanently";
  del.onclick = async()=>{
    await deleteDoc(doc(db,"messages",id));
    loadTrash();
  }
  box.appendChild(del);
  content.appendChild(box);
}

/* SEND MODAL */
window.openSend = ()=>{document.getElementById("sendModal").style.display="flex";}
window.closeSend = ()=>{
  document.getElementById("sendModal").style.display="none";
  document.getElementById("sendModalStatus").textContent="";
}

/* SEND MESSAGE */
window.sendMessage = async ()=>{
  const recipient = document.getElementById("recipient").value.trim();
  const text = document.getElementById("messageText").value.trim();
  const statusModal = document.getElementById("sendModalStatus");
  const statusMain = document.getElementById("sendStatus");

  statusModal.textContent = "";
  statusMain.textContent = "";

  if(text.length>200){
    statusModal.textContent="Message too long";
    statusModal.style.color="red";
    return;
  }

  const userDoc = await getDoc(doc(db,"users",recipient));
  if(!userDoc.exists()){
    statusModal.textContent="User does not exist";
    statusModal.style.color="red";
    return;
  }

  await addDoc(collection(db,"messages"),{
    from: username,
    to: recipient,
    text: text,
    deleted: false,
    timestamp: Date.now()
  });

  statusModal.textContent="Message sent successfully";
  statusModal.style.color="green";
  statusMain.textContent="Message sent to "+recipient;
  statusMain.style.color="green";

  // clear form
  document.getElementById("recipient").value="";
  document.getElementById("messageText").value="";
}

loadInbox();

</script>
</body>
</html>
