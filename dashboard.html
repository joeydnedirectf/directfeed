<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
body {margin:0;font-family:Arial;background:#f0f0f0;display:flex;}

/* SIDEBAR */
.sidebar {
  position: fixed;
  left:0;
  top:0;
  height:100%;
  width:250px;
  background:#1a1a1a;
  color:white;
  transition: width 0.3s;
  display:flex;
  flex-direction:column;
}
.sidebar.collapsed { width:60px; }
.sidebar .logo { font-size:22px; text-align:center; padding:15px 0; font-weight:bold; border-bottom:1px solid #333; }
.sidebar button {
  display:flex;
  align-items:center;
  width:100%;
  padding:12px 20px;
  border:none;
  background:none;
  color:white;
  cursor:pointer;
  text-align:left;
  font-size:16px;
  transition:background 0.2s;
}
.sidebar button:hover { background:#333; }
.sidebar button i { margin-right:10px; font-style:normal; width:20px; text-align:center; }
.sidebar button.active { background:#444; }

/* TOGGLE BUTTON */
.toggleBtn { background:#444; border:none; color:white; cursor:pointer; font-size:18px; padding:10px; text-align:left; }

/* CONTENT */
.content { margin-left:250px; padding:20px; transition: margin-left 0.3s; flex:1; }
h2 { margin-top:0; }

/* TOP RIGHT */
.topRight { position: fixed; top:15px; right:20px; text-align:right; }
.topRight button { margin-left:5px; padding:6px 10px; border:none; cursor:pointer; border-radius:4px; }
#logoutBtn { background:#007bff; color:white; }
#settingsBtn { background:#888; color:white; }

/* MESSAGE ROWS */
.messageRow { background:white; padding:15px; margin-bottom:10px; border-radius:6px; cursor:pointer; border:1px solid #ddd; }
.messageRow:hover { background:#f7f7f7; }
.fullMessage { background:white; padding:20px; border-radius:6px; border:1px solid #ddd; }

/* DELETE BUTTONS */
.deleteBtn { background:red; color:white; border:none; padding:10px; margin-top:10px; cursor:pointer; }
.permDelete { background:black; color:white; border:none; padding:10px; margin-top:10px; cursor:pointer; }

/* SEND BUTTON */
.sendBtn { position: fixed; bottom:60px; right:20px; background:#007bff; color:white; border:none; padding:16px 22px; border-radius:50px; cursor:pointer; }

/* SEND STATUS */
#sendStatus { position:fixed; bottom:20px; right:20px; font-size:14px; }

/* SEND MODAL */
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
.modalContent { background:white; padding:20px; border-radius:8px; width:320px; }
textarea { width:100%; height:80px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="logo">DirectFeed</div>
  <button class="toggleBtn" onclick="toggleSidebar()">☰</button>
  <button id="navInbox" onclick="loadInbox()"><i>📥</i><span class="label">Inbox</span></button>
  <button id="navTrash" onclick="loadTrash()"><i>🗑️</i><span class="label">Trash</span></button>
  <button id="navSend" onclick="openSend()"><i>✉️</i><span class="label">Send</span></button>
  <button id="navSettings" onclick="openSettings()"><i>⚙️</i><span class="label">Settings</span></button>
</div>

<!-- CONTENT -->
<div class="content" id="content"></div>

<!-- TOP RIGHT -->
<div class="topRight">
  <span>Welcome, <span id="userDisplay"></span></span>
  <button id="settingsBtn">Settings</button>
  <button id="logoutBtn">Logout</button>
</div>

<!-- SEND MODAL -->
<div class="modal" id="sendModal">
  <div class="modalContent">
    <h3>Send Message</h3>
    <input id="recipient" placeholder="Recipient username"><br><br>
    <textarea id="messageText" maxlength="200" placeholder="Message (200 max)"></textarea><br><br>
    <button onclick="sendMessage()">Send</button>
    <button onclick="closeSend()">Cancel</button>
    <div id="sendModalStatus" style="margin-top:10px;font-size:14px;"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyCnE-UOw56IASUOU_qwBcF5YsBOOml9BRY",
  authDomain:"directfeed-c3084.firebaseapp.com",
  projectId:"directfeed-c3084",
  storageBucket:"directfeed-c3084.firebasestorage.app",
  messagingSenderId:"780676224282",
  appId:"1:780676224282:web:8580ee6c3aa1738394c8a3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* SESSION LOGIN */
let username = sessionStorage.getItem("loggedInUser");
if(!username) window.location.href="login.html";
document.getElementById("userDisplay").textContent = username;

/* LOGOUT */
document.getElementById("logoutBtn").onclick = ()=>{ 
  sessionStorage.removeItem("loggedInUser"); 
  window.location.href="login.html"; 
}

/* SETTINGS NAVIGATION FIX */
function openSettings(){
  window.location.href = "settings.html"; // Navigate to settings page
  highlightNav("navSettings"); // Highlight sidebar
}

// Hook top-right Settings button
document.getElementById("settingsBtn").onclick = openSettings;

/* SIDEBAR TOGGLE */
function toggleSidebar(){
  const sb = document.getElementById("sidebar");
  sb.classList.toggle("collapsed");
  document.querySelector(".content").style.marginLeft = sb.classList.contains("collapsed")?"60px":"250px";
}

/* HIGHLIGHT NAV */
function highlightNav(id){
  ["navInbox","navTrash","navSend","navSettings"].forEach(b=>document.getElementById(b).classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* CONTENT AREA */
const content=document.getElementById("content");

/* INBOX */
window.loadInbox = async ()=>{
  highlightNav("navInbox");
  content.innerHTML="<h2>Inbox</h2>";
  const q=query(collection(db,"messages"), where("to","==",username), where("deleted","==",false));
  const snap=await getDocs(q);
  if(snap.empty) content.innerHTML+="<p>No messages.</p>";
  snap.forEach(docu=>{
    const data=docu.data();
    const row=document.createElement("div");
    row.className="messageRow";
    row.innerHTML="<b>From:</b> "+data.from+"<br>"+data.text.substring(0,60);
    row.onclick=()=>openMessage(docu.id,data);
    content.appendChild(row);
  });
}

/* OPEN MESSAGE */
async function openMessage(id,data){
  content.innerHTML="";
  const box=document.createElement("div");
  box.className="fullMessage";
  box.innerHTML="<h3>From: "+data.from+"</h3><p>"+data.text+"</p>";
  const del=document.createElement("button");
  del.className="deleteBtn";
  del.textContent="Delete";
  del.onclick=async()=>{ await updateDoc(doc(db,"messages",id),{deleted:true}); loadInbox(); }
  box.appendChild(del);
  content.appendChild(box);
}

/* TRASH */
window.loadTrash=async()=>{
  highlightNav("navTrash");
  content.innerHTML="<h2>Trash</h2>";
  const q=query(collection(db,"messages"), where("to","==",username), where("deleted","==",true));
  const snap=await getDocs(q);
  if(snap.empty) content.innerHTML+="<p>No messages in Trash.</p>";
  snap.forEach(docu=>{
    const data=docu.data();
    const row=document.createElement("div");
    row.className="messageRow";
    row.innerHTML="<b>From:</b> "+data.from+"<br>"+data.text.substring(0,60);
    row.onclick=()=>openTrash(docu.id,data);
    content.appendChild(row);
  });
}

/* OPEN TRASH */
async function openTrash(id,data){
  content.innerHTML="";
  const box=document.createElement("div");
  box.className="fullMessage";
  box.innerHTML="<h3>From: "+data.from+"</h3><p>"+data.text+"</p>";
  const del=document.createElement("button");
  del.className="permDelete";
  del.textContent="Delete Permanently";
  del.onclick=async()=>{ await deleteDoc(doc(db,"messages",id)); loadTrash(); }
  box.appendChild(del);
  content.appendChild(box);
}

/* SEND MODAL */
window.openSend=()=>{ document.getElementById("sendModal").style.display="flex"; highlightNav("navSend"); }
window.closeSend=()=>{ document.getElementById("sendModal").style.display="none"; document.getElementById("sendModalStatus").textContent=""; }

/* SEND MESSAGE */
window.sendMessage=async()=>{
  const recipient=document.getElementById("recipient").value.trim();
  const text=document.getElementById("messageText").value.trim();
  const statusModal=document.getElementById("sendModalStatus");
  const statusMain=document.getElementById("sendStatus");
  statusModal.textContent=""; statusMain.textContent="";
  if(text.length>200){ statusModal.textContent="Message too long"; statusModal.style.color="red"; return; }
  try{
    const userDoc=await getDoc(doc(db,"users",recipient));
    if(!userDoc.exists()){ statusModal.textContent="User does not exist"; statusModal.style.color="red"; return; }
    const docRef=await addDoc(collection(db,"messages"),{ from:username, to:recipient, text:text, deleted:false, timestamp:Date.now() });
    statusModal.textContent="Message sent successfully"; statusModal.style.color="green";
    statusMain.textContent="Message sent to "+recipient; statusMain.style.color="green";
    document.getElementById("recipient").value=""; document.getElementById("messageText").value="";
    loadInbox();
  } catch(e){ console.error(e); statusModal.textContent="Error sending message"; statusModal.style.color="red"; statusMain.textContent="Error sending message"; statusMain.style.color="red"; }
}

/* INITIAL LOAD */
loadInbox();
</script>
</body>
</html>
