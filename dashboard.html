<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DirectFeed Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:0;
top:0;
height:100%;
width:230px;
background:#111;
color:white;
display:flex;
flex-direction:column;
}

.sidebar h2{
padding:20px;
margin:0;
border-bottom:1px solid #333;
}

.sidebar button{
background:none;
border:none;
color:white;
padding:15px 20px;
text-align:left;
cursor:pointer;
font-size:16px;
}

.sidebar button:hover{
background:#333;
}

/* CONTENT */

.content{
margin-left:230px;
padding:30px;
}

/* USER BAR */

.userbar{
position:fixed;
top:10px;
right:20px;
}

.userbar button{
margin-left:8px;
padding:6px 10px;
border:none;
cursor:pointer;
border-radius:4px;
}

.logout{
background:#007bff;
color:white;
}

/* MESSAGE ROW */

.message{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:6px;
cursor:pointer;
border:1px solid #ddd;
}

.message:hover{
background:#f8f8f8;
}

/* FULL MESSAGE */

.fullMessage{
background:white;
padding:20px;
border-radius:6px;
border:1px solid #ddd;
}

/* BUTTONS */

.deleteBtn{
background:red;
color:white;
border:none;
padding:8px 14px;
margin-top:10px;
cursor:pointer;
}

/* SEND BUTTON */

.sendBtn{
position:fixed;
bottom:40px;
right:20px;
background:#007bff;
color:white;
border:none;
padding:14px 20px;
border-radius:40px;
cursor:pointer;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
align-items:center;
justify-content:center;
}

.modalBox{
background:white;
padding:20px;
width:320px;
border-radius:6px;
}

.modalBox input,
.modalBox textarea{
width:100%;
padding:6px;
}

</style>

</head>

<body>

<!-- USER BAR -->

<div class="userbar">
User: <span id="userDisplay"></span>
<button class="logout" id="logoutBtn">Logout</button>
</div>


<!-- SIDEBAR -->

<div class="sidebar">

<h2>DirectFeed</h2>

<button onclick="loadInbox()">Inbox</button>
<button onclick="loadTrash()">Trash</button>
<button onclick="openSettings()">Settings</button>

</div>


<!-- MAIN CONTENT -->

<div class="content" id="content"></div>

<button class="sendBtn" onclick="openSend()">Send</button>


<!-- SEND MODAL -->

<div class="modal" id="sendModal">

<div class="modalBox">

<h3>Send Message</h3>

<input id="recipient" placeholder="Recipient username">

<br><br>

<textarea id="messageText" maxlength="200" placeholder="Message (200 max)"></textarea>

<br><br>

<button onclick="sendMessage()">Send</button>
<button onclick="closeSend()">Cancel</button>

<div id="sendStatus"></div>

</div>

</div>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
where,
doc,
updateDoc,
deleteDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";


/* FIREBASE */

const firebaseConfig = {

apiKey:"AIzaSyCnE-UOw56IASUOU_qwBcF5YsBOOml9BRY",
authDomain:"directfeed-c3084.firebaseapp.com",
projectId:"directfeed-c3084"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


/* LOGIN SESSION */

let username = sessionStorage.getItem("loggedInUser");

if(!username){

window.location.href="login.html";

}

document.getElementById("userDisplay").textContent = username;


/* LOGOUT */

document.getElementById("logoutBtn").onclick = ()=>{

sessionStorage.removeItem("loggedInUser");

window.location.href="login.html";

};


/* SETTINGS */

window.openSettings = function(){

window.location.href="settings.html";

};


const content = document.getElementById("content");


/* LOAD INBOX */

window.loadInbox = async function(){

content.innerHTML="<h2>Inbox</h2>";

const q=query(
collection(db,"messages"),
where("to","==",username),
where("deleted","==",false)
);

const snap = await getDocs(q);

if(snap.empty){

content.innerHTML += "<p>No messages</p>";

}

snap.forEach(docu=>{

const data = docu.data();

const div=document.createElement("div");

div.className="message";

div.innerHTML="<b>From:</b> "+data.from+"<br>"+data.text.substring(0,60);

div.onclick=()=>openMessage(docu.id,data);

content.appendChild(div);

});

};


/* OPEN MESSAGE */
function openMessage(id,data){

content.innerHTML="";

const box=document.createElement("div");
box.className="fullMessage";

box.innerHTML="<h3>From: "+data.from+"</h3><p>"+data.text+"</p>";

/* DELETE BUTTON */

const del=document.createElement("button");
del.className="deleteBtn";
del.textContent="Delete";

del.onclick=async()=>{

await updateDoc(doc(db,"messages",id),{
deleted:true
});

loadInbox();

};

/* REPLY BUTTON */

const reply=document.createElement("button");
reply.textContent="Reply";
reply.style.marginLeft="10px";

reply.onclick=()=>{

openSend();

/* auto fill recipient */

document.getElementById("recipient").value=data.from;

/* remember which message we reply to */

window.replyTarget=id;

};

box.appendChild(del);
box.appendChild(reply);

content.appendChild(box);

}
  
/* TRASH */
async function openTrash(id, data){
  content.innerHTML="";
  const box = document.createElement("div");
  box.className = "fullMessage";

  // show original message
  box.innerHTML = "<h3>From: " + data.from + "</h3><p>" + data.text + "</p>";

  // Restore button
  const restoreBtn = document.createElement("button");
  restoreBtn.className = "deleteBtn"; 
  restoreBtn.style.background = "green";
  restoreBtn.textContent = "Restore to Inbox";
  restoreBtn.onclick = async () => {
      await updateDoc(doc(db,"messages",id), { deleted: false });
      loadTrash(); // refresh trash view
  };

  // Permanent delete button (click only deletes)
  const del = document.createElement("button");
  del.className = "permDelete";
  del.textContent = "Delete Permanently";
  del.onclick = async () => { 
      if(confirm("Are you sure you want to permanently delete this message?")){
          await deleteDoc(doc(db,"messages",id)); 
          loadTrash(); 
      }
  };

  // Append buttons
  box.appendChild(restoreBtn);
  box.appendChild(del);

  content.appendChild(box);
}
  
/* SEND MESSAGE */

window.sendMessage = async function(){

const recipient=document.getElementById("recipient").value.trim();

const text=document.getElementById("messageText").value.trim();

const status=document.getElementById("sendStatus");

if(text.length===0){

status.textContent="Message empty";

return;

}

try{

const userCheck = await getDoc(doc(db,"users",recipient));

if(!userCheck.exists()){

status.textContent="User does not exist";

return;

}

await addDoc(collection(db,"messages"),{

from:username,
to:recipient,
text:text,
replyTo: window.replyTarget || null,
deleted:false,
timestamp:Date.now()
});

window.replyTarget = null;

status.textContent="Sent!";

document.getElementById("recipient").value="";
document.getElementById("messageText").value="";

closeSend();
loadInbox();

}
catch(err){

console.error(err);

status.textContent="Error sending message";

}

};


/* MODAL */

window.openSend=function(){

document.getElementById("sendModal").style.display="flex";

};

window.closeSend=function(){

document.getElementById("sendModal").style.display="none";

document.getElementById("sendStatus").textContent="";

};


/* START */

loadInbox();

</script>

</body>
</html>
