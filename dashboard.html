<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f0f0f0;
display:flex;
}

.sidebar{
position:fixed;
left:0;
top:0;
height:100%;
width:250px;
background:#1a1a1a;
color:white;
display:flex;
flex-direction:column;
}

.sidebar button{
padding:14px;
border:none;
background:none;
color:white;
cursor:pointer;
text-align:left;
font-size:16px;
}

.sidebar button:hover{
background:#333;
}

.content{
margin-left:250px;
padding:20px;
flex:1;
}

.messageRow{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:6px;
cursor:pointer;
border:1px solid #ddd;
}

.messageRow:hover{
background:#f7f7f7;
}

.fullMessage{
background:white;
padding:20px;
border-radius:6px;
border:1px solid #ddd;
}

.deleteBtn{
background:red;
color:white;
border:none;
padding:10px;
margin-top:10px;
cursor:pointer;
}

.replyBtn{
background:#007bff;
color:white;
border:none;
padding:10px;
margin-top:10px;
margin-left:10px;
cursor:pointer;
}

.sendBtn{
position:fixed;
bottom:60px;
right:20px;
background:#007bff;
color:white;
border:none;
padding:16px 22px;
border-radius:50px;
cursor:pointer;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modalContent{
background:white;
padding:20px;
border-radius:8px;
width:320px;
}

textarea{
width:100%;
height:80px;
}

input{
width:100%;
padding:6px;
}

.replyDivider{
border-top:1px solid #ddd;
margin-top:8px;
padding-top:6px;
font-size:13px;
}

.replyPreview{
color:blue;
cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar">

<button id="navInbox">Inbox</button>
<button id="navTrash">Trash</button>
<button onclick="openSend()">Send</button>

</div>

<div class="content" id="content"></div>

<button class="sendBtn" onclick="openSend()">Send</button>

<!-- SEND MODAL -->

<div class="modal" id="sendModal">
<div class="modalContent">

<h3>Send Message</h3>

<input id="recipient" placeholder="Recipient username">

<br><br>

<textarea id="messageText" maxlength="200" placeholder="Message (200 max)"></textarea>

<br><br>

<button id="sendButton">Send</button>
<button id="cancelSendBtn">Cancel</button>

<div id="sendModalStatus" style="margin-top:10px;font-size:14px;"></div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
where,
doc,
updateDoc,
deleteDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCnE-UOw56IASUOU_qwBcF5YsBOOml9BRY",
authDomain:"directfeed-c3084.firebaseapp.com",
projectId:"directfeed-c3084"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

let username = sessionStorage.getItem("loggedInUser");

if(!username){
window.location.href="login.html";
}

const content = document.getElementById("content");

let replyTarget = null;



/* LOAD INBOX */

async function loadInbox(){

content.innerHTML="<h2>Inbox</h2>";

const q=query(
collection(db,"messages"),
where("to","==",username),
where("deleted","==",false)
);

const snap=await getDocs(q);

if(snap.empty){
content.innerHTML+="<p>No messages.</p>";
}

for(const docu of snap.docs){

const data=docu.data();

const row=document.createElement("div");

row.className="messageRow";

row.innerHTML=
"<b>From:</b> "+data.from+
"<br>"+data.text.substring(0,60);

row.onclick=()=>openMessage(docu.id,data);




/* SHOW REPLY PREVIEW */

if(data.replyTo){

const originalSnap = await getDoc(doc(db,"messages",data.replyTo));

if(originalSnap.exists()){

const orig=originalSnap.data();

const divider=document.createElement("div");

divider.className="replyDivider";

const preview=document.createElement("div");

preview.className="replyPreview";

preview.innerHTML="<small>Replied to:</small><br>"+orig.text.substring(0,40);

preview.onclick=(e)=>{

e.stopPropagation();

openMessage(data.replyTo,orig);

};

divider.appendChild(preview);

row.appendChild(divider);

}

}

content.appendChild(row);

}

}



/* OPEN MESSAGE */

function openMessage(id,data){

content.innerHTML="";

const box=document.createElement("div");

box.className="fullMessage";

box.innerHTML="<h3>From: "+data.from+"</h3><p>"+data.text+"</p>";



const del=document.createElement("button");

del.className="deleteBtn";

del.textContent="Delete";

del.onclick=async()=>{

await updateDoc(doc(db,"messages",id),{deleted:true});

loadInbox();

};



const reply=document.createElement("button");

reply.className="replyBtn";

reply.textContent="Reply";

reply.onclick=()=>{

replyTarget=id;

openSend();

document.getElementById("recipient").value=data.from;

};



box.appendChild(del);

box.appendChild(reply);

content.appendChild(box);

}



/* SEND MESSAGE */

async function sendMessage(){

const recipient=document.getElementById("recipient").value.trim();

const text=document.getElementById("messageText").value.trim();

const status=document.getElementById("sendModalStatus");

if(text.length===0){

status.textContent="Message empty";

status.style.color="red";

return;

}



try{

const userDocSnap=await getDoc(doc(db,"users",recipient));

if(!userDocSnap.exists()){

status.textContent="Recipient does not exist";

status.style.color="red";

return;

}



await addDoc(collection(db,"messages"),{

from:username,

to:recipient,

text:text,

replyTo:replyTarget || null,

deleted:false,

timestamp:Date.now()

});



status.textContent="Sent!";

status.style.color="green";



document.getElementById("recipient").value="";

document.getElementById("messageText").value="";



replyTarget=null;



closeSend();

loadInbox();

}

catch(err){

console.error(err);

status.textContent="Error sending";

status.style.color="red";

}

}



/* MODAL */

function openSend(){

document.getElementById("sendModal").style.display="flex";

}

function closeSend(){

document.getElementById("sendModal").style.display="none";

document.getElementById("sendModalStatus").textContent="";

}



/* BUTTON HOOKS */

document.getElementById("sendButton").addEventListener("click",sendMessage);

document.getElementById("cancelSendBtn").addEventListener("click",closeSend);

document.getElementById("navInbox").onclick=loadInbox;



/* START */

loadInbox();

</script>

</body>
</html>
