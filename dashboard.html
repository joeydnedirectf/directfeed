<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
body {margin:0;font-family:Arial;background:#f0f0f0;display:flex;}
/* SIDEBAR */
.sidebar {position:fixed;left:0;top:0;height:100%;width:250px;background:#1a1a1a;color:white;transition:width 0.3s;display:flex;flex-direction:column;}
.sidebar.collapsed{width:60px;}
.sidebar .logo{font-size:22px;text-align:center;padding:15px 0;font-weight:bold;border-bottom:1px solid #333;}
.sidebar button{display:flex;align-items:center;width:100%;padding:12px 20px;border:none;background:none;color:white;cursor:pointer;text-align:left;font-size:16px;transition:background 0.2s;}
.sidebar button:hover{background:#333;}
.sidebar button i{margin-right:10px;font-style:normal;width:20px;text-align:center;}
.sidebar button.active{background:#444;}
.toggleBtn{background:#444;border:none;color:white;cursor:pointer;font-size:18px;padding:10px;text-align:left;}

/* CONTENT */
.content{margin-left:250px;padding:20px;transition:margin-left 0.3s;flex:1;}
h2{margin-top:0;}
#messageViewer { background:white;padding:15px;border-radius:6px;border:1px solid #ddd;margin-bottom:10px; }

/* TOP RIGHT */
.topRight{position:fixed;top:15px;right:20px;text-align:right;}
.topRight button{margin-left:5px;padding:6px 10px;border:none;cursor:pointer;border-radius:4px;}
#logoutBtn{background:#007bff;color:white;}
#settingsBtn{background:#888;color:white;}

/* MESSAGE ROWS */
.messageRow{background:white;padding:15px;margin-bottom:10px;border-radius:6px;cursor:pointer;border:1px solid #ddd;}
.messageRow:hover{background:#f7f7f7;}
.fullMessage{background:white;padding:20px;border-radius:6px;border:1px solid #ddd;}
.deleteBtn{background:red;color:white;border:none;padding:10px;margin-top:10px;cursor:pointer;}
.permDelete{background:black;color:white;border:none;padding:10px;margin-top:10px;cursor:pointer;}
.sendBtn{position:fixed;bottom:60px;right:20px;background:#007bff;color:white;border:none;padding:16px 22px;border-radius:50px;cursor:pointer;}
#sendStatus{position:fixed;bottom:20px;right:20px;font-size:14px;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;}
.modalContent{background:white;padding:20px;border-radius:8px;width:320px;}
textarea{width:100%;height:80px;}
input{width:100%;padding:6px;}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="logo">DirectFeed</div>
  <button class="toggleBtn" onclick="toggleSidebar()">☰</button>
  <button id="navInbox"><i>📥</i><span class="label">Inbox</span></button>
  <button id="navTrash"><i>🗑️</i><span class="label">Trash</span></button>
  <button id="navSend"><i>✉️</i><span class="label">Send</span></button>
  <button id="navSettings"><i>⚙️</i><span class="label">Settings</span></button>
</div>

<!-- CONTENT -->
<div class="content" id="content">
  <h2>Inbox</h2>
  <div id="messageViewer"></div>
</div>

<!-- TOP RIGHT -->
<div class="topRight">
  <span>Welcome, <span id="userDisplay"></span></span>
  <button id="settingsBtn">Settings</button>
  <button id="logoutBtn">Logout</button>
</div>

 <!-- SEND MODAL -->
<div class="modal" id="sendModal">
  <div class="modalContent">
    <h3>Send Message</h3>
    <input id="recipient" placeholder="Recipient username"><br><br>
    <textarea id="messageText" maxlength="200" placeholder="Message (200 max)"></textarea><br><br>
    <button id="sendButton">Send</button>
    <button id="cancelSendBtn">Cancel</button>
    <div id="sendModalStatus" style="margin-top:10px;font-size:14px;"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey:"AIzaSyCnE-UOw56IASUOU_qwBcF5YsBOOml9BRY",
  authDomain:"directfeed-c3084.firebaseapp.com",
  projectId:"directfeed-c3084",
  storageBucket:"directfeed-c3084.firebasestorage.app",
  messagingSenderId:"780676224282",
  appId:"1:780676224282:web:8580ee6c3aa1738394c8a3"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* SESSION LOGIN */
let username = sessionStorage.getItem("loggedInUser");
if(!username) window.location.href="login.html";
document.getElementById("userDisplay").textContent = username;

/* LOGOUT */
document.getElementById("logoutBtn").onclick = ()=>{ 
  sessionStorage.removeItem("loggedInUser"); 
  window.location.href="login.html"; 
}

/* SETTINGS NAVIGATION */
function openSettings(){ window.location.href="settings.html"; }
document.getElementById("settingsBtn").onclick = openSettings;
document.getElementById("navSettings").onclick = openSettings;

/* SIDEBAR TOGGLE */
function toggleSidebar(){
  const sb=document.getElementById("sidebar");
  sb.classList.toggle("collapsed");
  document.querySelector(".content").style.marginLeft=sb.classList.contains("collapsed")?"60px":"250px";
}

/* HIGHLIGHT NAV */
function highlightNav(id){
  ["navInbox","navTrash","navSend","navSettings"].forEach(b=>document.getElementById(b).classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

const content=document.getElementById("content");
let replyingToMessage = null;
let replyingThread = null;

/* INBOX */
async function loadInbox(){
  highlightNav("navInbox");
  content.innerHTML="<h2>Inbox</h2><div id='messageViewer'></div>";
  const q=query(collection(db,"messages"), where("to","==",username), where("deleted","==",false));
  const snap=await getDocs(q);
  const messages = [];
  snap.forEach(docu=>{
    const data=docu.data();
    // ensure each message has threadId
    messages.push({id:docu.id, threadId: data.threadId || docu.id, ...data});
  });
  messages.sort((a,b)=>b.timestamp-a.timestamp);
  const viewer=document.getElementById("messageViewer");
  if(messages.length===0){ viewer.innerHTML="<p>No messages.</p>"; return; }

  messages.forEach(m=>{
    const row=document.createElement("div");
    row.className="messageRow";
    row.innerHTML="<b>From:</b> "+m.from+"<br>"+m.text.substring(0,60);
    row.onclick=()=>openMessage(m.threadId); // pass threadId, not full message
    viewer.appendChild(row);
  });
}

/* OPEN MESSAGE + THREAD */
async function openMessage(threadId){
  highlightNav("");
  content.innerHTML="<h2>Conversation</h2><div id='messageViewer'></div>";
  const viewer=document.getElementById("messageViewer");

  // Load full thread
  const q=query(collection(db,"messages"), where("threadId","==",threadId));
  const snap=await getDocs(q);
  let threadMessages=[];
  snap.forEach(docu=>{ threadMessages.push({id:docu.id,...docu.data()}); });
  threadMessages.sort((a,b)=>a.timestamp-a.timestamp);

  // Set replying to the latest message in thread
  replyingThread = threadId;
  replyingToMessage = threadMessages[threadMessages.length-1].id;

  threadMessages.forEach(m=>{
    const msgDiv=document.createElement("div");
    msgDiv.style.borderBottom="1px solid #ccc";
    msgDiv.style.padding="10px";
    msgDiv.innerHTML=`<b>${m.from}</b><br>${m.text}`;
    viewer.appendChild(msgDiv);
  });

  // Reply button
  const replyBtn=document.createElement("button");
  replyBtn.textContent="Reply";
  replyBtn.style.marginTop="10px";
  replyBtn.onclick=openSend;
  viewer.appendChild(replyBtn);
}

/* TRASH */
async function loadTrash(){
  highlightNav("navTrash");
  content.innerHTML="<h2>Trash</h2><div id='messageViewer'></div>";
  const q=query(collection(db,"messages"), where("to","==",username), where("deleted","==",true));
  const snap=await getDocs(q);
  const viewer=document.getElementById("messageViewer");
  if(snap.empty){ viewer.innerHTML+="<p>No messages in Trash.</p>"; return; }
  snap.forEach(docu=>{
    const data=docu.data();
    const row=document.createElement("div");
    row.className="messageRow";
    row.innerHTML="<b>From:</b> "+data.from+"<br>"+data.text.substring(0,60);
    row.onclick=()=>openTrash(docu.id,data);
    viewer.appendChild(row);
  });
}

/* OPEN TRASH */
async function openTrash(id, data){
  content.innerHTML="";
  const box = document.createElement("div");
  box.className = "fullMessage";
  box.innerHTML = "<h3>From: " + data.from + "</h3><p>" + data.text + "</p>";

  // Restore button
  const restoreBtn = document.createElement("button");
  restoreBtn.className = "deleteBtn";
  restoreBtn.style.background = "green";
  restoreBtn.textContent = "Restore to Inbox";
  restoreBtn.onclick = async () => {
      await updateDoc(doc(db,"messages",id), { deleted: false });
      loadTrash();
  };

  // Permanent delete button
  const del = document.createElement("button");
  del.className = "permDelete";
  del.textContent = "Delete Permanently";
  del.onclick = async () => { 
      await deleteDoc(doc(db,"messages",id)); 
      loadTrash(); 
  };

  box.appendChild(restoreBtn);
  box.appendChild(del);
  content.appendChild(box);
}

/* SEND MODAL */
function openSend(){ 
  const modal=document.getElementById("sendModal");
  modal.style.display="flex"; 
  if(replyingToMessage){
    // autofill recipient
    const threadMsg = document.getElementById("recipient");
    threadMsg.value = ""; // default empty
    // optional: in your app, can fetch from thread message
  }
}
function closeSend(){ 
  const modal=document.getElementById("sendModal");
  modal.style.display="none"; 
  const status=document.getElementById("sendModalStatus");
  status.textContent="";
  replyingThread = null;
  replyingToMessage = null;
}

document.getElementById("navInbox").onclick = loadInbox;
document.getElementById("navTrash").onclick = loadTrash;
document.getElementById("navSend").onclick = openSend;

/* SEND MESSAGE */
async function sendMessage(){
  const recipient = document.getElementById("recipient");
  const textEl = document.getElementById("messageText");
  const statusModal = document.getElementById("sendModalStatus");

  if(!recipient || !textEl || !statusModal) return;

  const recipientVal = recipient.value.trim();
  const text = textEl.value.trim();

  if(text.length===0){ statusModal.textContent="Message cannot be empty"; statusModal.style.color="red"; return; }
  if(text.length>200){ statusModal.textContent="Message too long (max 200)"; statusModal.style.color="red"; return; }

  try{
    const userDocSnap = await getDoc(doc(db,"users",recipientVal));
    if(!userDocSnap.exists()){ statusModal.textContent="Recipient does not exist"; statusModal.style.color="red"; return; }

    let thread = replyingThread;
    let replyTo = replyingToMessage;

    const newMsg = await addDoc(collection(db,"messages"),{
        from: username,
        to: recipientVal,
        text: text,
        deleted: false,
        timestamp: Date.now(),
        threadId: thread,
        replyTo: replyTo
    });

    if(!thread){
        await updateDoc(doc(db,"messages",newMsg.id),{ threadId: newMsg.id });
    }

    statusModal.textContent="Message sent successfully!"; statusModal.style.color="green";
    recipient.value=""; textEl.value="";
    closeSend();
    loadInbox();
  } catch(err){ console.error(err); statusModal.textContent="Error sending message"; statusModal.style.color="red"; }
}

document.getElementById("sendButton").addEventListener("click", sendMessage);
document.getElementById("cancelSendBtn").addEventListener("click", closeSend);

/* INITIAL LOAD */
loadInbox();

</script>
</body>
</html>
