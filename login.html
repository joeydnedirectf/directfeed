<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - DirectFeed</title>
<style>
body{font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;background:#f0f0f0;}
form{display:flex;flex-direction:column;width:280px;padding:25px;background:white;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
input,button{margin:6px 0;padding:10px;border-radius:4px;border:1px solid #ccc;}
button{background:#007bff;color:white;border:none;cursor:pointer;}
#error{color:red;font-size:0.9em;}
#securityCodeBox{background:#eee;text-align:center;padding:10px;font-weight:bold;letter-spacing:2px;margin:5px 0;font-family:monospace;}
</style>
</head>
<body>

<form id="loginForm">
<h2>Login</h2>
<input id="username" placeholder="Username" required>
<input id="password" type="password" placeholder="Password" required>
<button type="submit">Login</button>
<div id="error"></div>
<div id="securityCodeBox" style="display:none"></div>
</form>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyCnE-UOw56IASUOU_qwBcF5YsBOOml9BRY",
  authDomain:"directfeed-c3084.firebaseapp.com",
  projectId:"directfeed-c3084",
  storageBucket:"directfeed-c3084.firebasestorage.app",
  messagingSenderId:"780676224282",
  appId:"1:780676224282:web:8580ee6c3aa1738394c8a3"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form=document.getElementById("loginForm");
const error=document.getElementById("error");
const securityBox=document.getElementById("securityCodeBox");

async function hashPassword(password){
  const enc=new TextEncoder();
  const data=enc.encode(password);
  const hashBuffer=await crypto.subtle.digest("SHA-256",data);
  return Array.from(new Uint8Array(hashBuffer)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

let securityPassed=false;

form.addEventListener("submit",async e=>{
  e.preventDefault();
  error.textContent="";

  const usernameVal=document.getElementById("username").value.trim();
  const passwordVal=document.getElementById("password").value;
  const hashed=await hashPassword(passwordVal);

  const userRef=doc(db,"users",usernameVal);
  const snap=await getDoc(userRef);
  if(!snap.exists()){ error.textContent="Invalid username or password"; return; }
  const data=snap.data();
  if(data.password!==hashed){ error.textContent="Invalid username or password"; return; }

  if(data.securityCodeEnabled && !securityPassed){
    // generate code
    const code=Math.random().toString(36).substring(2,7).toUpperCase();
    securityBox.textContent=code;
    securityBox.style.display="block";
    error.textContent=`Security Code enabled: Enter code from box`;
    
    const inputCode=prompt(`Hello ${usernameVal}, enter code from below box:\n${code}`);
    if(inputCode!==code){ error.textContent="Incorrect security code"; return; }
    securityPassed=true;
  }

  sessionStorage.setItem("loggedInUser",usernameVal);
  window.location.href="dashboard.html";
});

if(sessionStorage.getItem("loggedInUser")) window.location.href="dashboard.html";
</script>
</body>
</html>
