<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
  body { font-family: Arial; display:flex; justify-content:center; align-items:center; height:100vh; background:#f0f0f0; }
  form { display:flex; flex-direction:column; width:250px; padding:20px; background:white; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); }
  input, button { margin:5px 0; padding:10px; border-radius:4px; border:1px solid #ccc; }
  button { cursor:pointer; background:#007bff; color:white; border:none; }
  .error { color:red; font-size:0.9em; margin-top:5px; }
</style>
</head>
<body>

<form id="loginForm">
  <h2>Login</h2>
  <input type="text" id="username" placeholder="Username" required>
  <input type="password" id="password" placeholder="Password" required>
  <button type="submit">Login</button>
  <div class="error" id="errorMsg"></div>
</form>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCnE-UOw56IASUOU_qwBcF5YsBOOml9BRY",
  authDomain: "directfeed-c3084.firebaseapp.com",
  projectId: "directfeed-c3084",
  storageBucket: "directfeed-c3084.firebasestorage.app",
  messagingSenderId: "780676224282",
  appId: "1:780676224282:web:8580ee6c3aa1738394c8a3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const loginForm = document.getElementById("loginForm");
const errorMsg = document.getElementById("errorMsg");

loginForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  const userRef = doc(db, "users", username);
  const userSnap = await getDoc(userRef);

  if(userSnap.exists()) {
    const userData = userSnap.data();
    if(userData.password === password) {
      sessionStorage.setItem("loggedInUser", username);
      window.location.href = "dashboard.html";
    } else {
      errorMsg.textContent = "Incorrect password!";
    }
  } else {
    errorMsg.textContent = "Username does not exist!";
  }
});

// Redirect if already logged in
if(sessionStorage.getItem("loggedInUser")) {
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
