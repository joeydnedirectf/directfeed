<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - DirectFeed</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
</head>
<body>

<div>
  <input type="text" id="tag" placeholder="Tag">
  <input type="password" id="password" placeholder="Password">
  <button id="loginBtn">Login</button>
</div>

<script>
  // 1️⃣ Create Supabase client first
  const supabaseUrl = 'https://bevymbmfaxpfplcoiuno.supabase.co';
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJldnltYm1mYXhwZnBsY29pdW5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NTY2MTksImV4cCI6MjA4OTAzMjYxOX0.Gf8VZ08-B3XlEfyE5PBJhmkIxXYZ6ONC4bdSSUV-HLI';
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  // 2️⃣ Attach login function to button
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const tag = document.getElementById('tag').value.trim();
    const password = document.getElementById('password').value;

    if(!tag || !password){
      alert("Enter your tag and password.");
      return;
    }

    try {
      const { data, error } = await supabase
        .from('users')
        .select('*')
        .eq('tag', tag)
        .eq('password', password)
        .single();

      if(error){
        console.error(error);
        alert("Login failed. Check table permissions and RLS settings.");
        return;
      }

      if(!data){
        alert("Invalid tag or password.");
        return;
      }

      // Successful login
      localStorage.setItem('userTag', tag);
      window.location.href = 'dashboard.html';
    } catch(err){
      console.error(err);
      alert("An error occurred. Try again.");
    }
  });
</script>

</body>
</html>
