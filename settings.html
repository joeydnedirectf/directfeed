<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - DirectFeed</title>
<style>
body{
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#f0f0f0;
}
form{
  display:flex;
  flex-direction:column;
  width:280px;
  padding:25px;
  background:white;
  border-radius:8px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}
input,button{
  margin:6px 0;
  padding:10px;
  border-radius:4px;
  border:1px solid #ccc;
}
button{
  background:#007bff;
  color:white;
  border:none;
  cursor:pointer;
  font-weight:bold;
}
#error{
  color:red;
  font-size:0.9em;
}
#loading{
  display:none;
  text-align:center;
  margin-top:10px;
}
.spinner{
  border:4px solid #eee;
  border-top:4px solid #007bff;
  border-radius:50%;
  width:24px;
  height:24px;
  animation:spin 1s linear infinite;
  margin:auto;
}
.codeBox{
  margin-top:10px;
  padding:10px;
  background:#ddd;
  font-weight:bold;
  text-align:center;
  letter-spacing:3px;
  font-size:18px;
  border-radius:4px;
}
@keyframes spin{
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}
</style>
</head>
<body>

<form id="loginForm">
  <h2>Login</h2>
  <input id="username" placeholder="Username" required>
  <input id="password" type="password" placeholder="Password" required>
  
  <div id="securitySection" style="display:none;">
    <div id="codeMessage"></div>
    <input id="codeInput" placeholder="Enter security code">
  </div>

  <button type="submit" id="loginBtn">Login</button>
  <div id="error"></div>
  <div id="loading">
    <div class="spinner"></div>
    <div>Checking login...</div>
  </div>
</form>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getFirestore, doc, getDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCnE-UOw56IASUOU_qwBcF5YsBOOml9BRY",
  authDomain: "directfeed-c3084.firebaseapp.com",
  projectId: "directfeed-c3084",
  storageBucket: "directfeed-c3084.firebasestorage.app",
  messagingSenderId: "780676224282",
  appId: "1:780676224282:web:8580ee6c3aa1738394c8a3"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

if(sessionStorage.getItem("loggedInUser")){
  window.location.href="dashboard.html";
}

// Helper: SHA256 hashing
async function hashPassword(password){
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b => b.toString(16).padStart(2,"0"))
    .join("");
}

// Generate random 5-char alphanumeric code
function generateCode(){ 
  return Math.random().toString(36).substring(2,7).toUpperCase();
}

let tempLoginUser = null; // holds username during 2FA
let tempCode = null;

const form = document.getElementById("loginForm");
const error = document.getElementById("error");
const loading = document.getElementById("loading");
const securitySection = document.getElementById("securitySection");
const codeMessage = document.getElementById("codeMessage");
const codeInput = document.getElementById("codeInput");

form.addEventListener("submit", async e=>{
  e.preventDefault();
  error.textContent="";
  loading.style.display="block";

  const usernameVal = document.getElementById("username").value.trim();
  const passwordVal = document.getElementById("password").value;

  if(!usernameVal || !passwordVal){ loading.style.display="none"; return; }

  // 1. Hash password
  const hashed = await hashPassword(passwordVal);

  // 2. Check user
  const ref = doc(db,"users",usernameVal);
  const snap = await getDoc(ref);
  loading.style.display="none";
  if(!snap.exists()){ error.textContent="Invalid username or password"; return; }

  const data = snap.data();
  if(data.password!==hashed){ error.textContent="Invalid username or password"; return; }

  // 3. Check if 2FA enabled
  if(data.securityCodeEnabled){
    tempLoginUser = usernameVal;
    tempCode = generateCode();
    // Send automated message from security#df
    await addDoc(collection(db,"messages"),{
      from:"security#df",
      to:usernameVal,
      text:`Hello ${usernameVal}, you tried to login. Please enter the code below.`,
      code: tempCode,
      deleted:false,
      timestamp:Date.now()
    });
    securitySection.style.display="block";
    codeMessage.innerHTML = `Enter this code: <div class="codeBox">${tempCode}</div>`;
    return;
  }

  // If no 2FA, login directly
  sessionStorage.setItem("loggedInUser",usernameVal);
  window.location.href="dashboard.html";
});

// 4. Security code verification
codeInput.addEventListener("input", ()=>{
  if(codeInput.value.trim().toUpperCase()===tempCode){
    sessionStorage.setItem("loggedInUser",tempLoginUser);
    window.location.href="dashboard.html";
  }
});
</script>
</body>
</html>
