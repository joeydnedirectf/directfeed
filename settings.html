<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Settings</title>
<style>
body{margin:0;font-family:Arial; background:#f0f0f0;}
.topBar{background:#222;color:white;padding:15px;display:flex;align-items:center;}
.topBar button{margin-right:10px;padding:6px 10px;border:none;border-radius:4px;cursor:pointer;background:#007bff;color:white;}
.content{padding:20px;}
button{padding:10px 15px;margin-top:10px;border:none;border-radius:4px;cursor:pointer;}
.changePass{background:#007bff;color:white;}
.deleteAcc{background:red;color:white;}
</style>
</head>
<body>

<div class="topBar">
  <button onclick="goBack()">← Back</button>
  <span id="settingsUser"></span>
</div>

<div class="content">
  <button class="changePass" onclick="changePassword()">Change Password</button><br>
  <button class="deleteAcc" onclick="deleteAccount()">Delete Account</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getFirestore, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyCnE-UOw56IASUOU_qwBcF5YsBOOml9BRY",
  authDomain:"directfeed-c3084.firebaseapp.com",
  projectId:"directfeed-c3084",
  storageBucket:"directfeed-c3084.firebasestorage.app",
  messagingSenderId:"780676224282",
  appId:"1:780676224282:web:8580ee6c3aa1738394c8a3"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let username=sessionStorage.getItem("loggedInUser");
if(!username) window.location.href="login.html";
document.getElementById("settingsUser").textContent = "Username: "+username;

window.goBack = ()=>{ window.location.href="dashboard.html"; }

window.changePassword = async ()=>{
  let newPass = prompt("Enter new password (will be hashed SHA256 before saving):");
  if(!newPass) return;

  // Hashing SHA256 in browser
  const msgUint8 = new TextEncoder().encode(newPass);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hashHex = hashArray.map(b=>b.toString(16).padStart(2,'0')).join('');

  await updateDoc(doc(db,"users",username),{password:hashHex});
  alert("Password updated successfully!");
}

window.deleteAccount = async ()=>{
  if(!confirm("Are you sure? This will delete your account permanently!")) return;
  await deleteDoc(doc(db,"users",username));
  sessionStorage.removeItem("loggedInUser");
  alert("Account deleted. Returning to login.");
  window.location.href="login.html";
}
</script>

</body>
</html>
