<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Settings</title>
<style>
body {margin:0;font-family:Arial;background:#f0f0f0;display:flex;}

/* SIDEBAR */
.sidebar {
  position: fixed;
  left:0;
  top:0;
  height:100%;
  width:250px;
  background:#1a1a1a;
  color:white;
  transition: width 0.3s;
  display:flex;
  flex-direction:column;
}
.sidebar.collapsed { width:60px; }
.sidebar .logo { font-size:22px; text-align:center; padding:15px 0; font-weight:bold; border-bottom:1px solid #333; }
.sidebar button {
  display:flex;
  align-items:center;
  width:100%;
  padding:12px 20px;
  border:none;
  background:none;
  color:white;
  cursor:pointer;
  text-align:left;
  font-size:16px;
  transition:background 0.2s;
}
.sidebar button:hover { background:#333; }
.sidebar button i { margin-right:10px; font-style:normal; width:20px; text-align:center; }
.sidebar button.active { background:#444; }

/* TOGGLE BUTTON */
.toggleBtn { background:#444; border:none; color:white; cursor:pointer; font-size:18px; padding:10px; text-align:left; }

/* CONTENT */
.content { margin-left:250px; padding:20px; transition: margin-left 0.3s; flex:1; }
h2 { margin-top:0; }

/* USER INFO / SETTINGS BUTTONS */
.userInfo { margin-bottom:20px; font-size:18px; }
button { padding:10px 15px; margin-top:10px; border:none; border-radius:4px; cursor:pointer; }
.changePass { background:#007bff; color:white; }
.deleteAcc { background:red; color:white; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="logo">DirectFeed</div>
  <button class="toggleBtn" onclick="toggleSidebar()">☰</button>
  <button id="navInbox" onclick="loadInbox()"><i>📥</i><span class="label">Inbox</span></button>
  <button id="navTrash" onclick="loadTrash()"><i>🗑️</i><span class="label">Trash</span></button>
  <button id="navSend" onclick="openSend()"><i>✉️</i><span class="label">Send</span></button>
  <button id="navSettings" class="active" onclick="loadSettings()"><i>⚙️</i><span class="label">Settings</span></button>
</div>

<!-- CONTENT -->
<div class="content" id="content">
  <h2>Settings</h2>
  <div class="userInfo">Username: <span id="settingsUser"></span></div>
  <button class="changePass" onclick="changePassword()">Change Password</button><br>
  <button class="deleteAcc" onclick="deleteAccount()">Delete Account</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getFirestore, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyCnE-UOw56IASUOU_qwBcF5YsBOOml9BRY",
  authDomain:"directfeed-c3084.firebaseapp.com",
  projectId:"directfeed-c3084",
  storageBucket:"directfeed-c3084.firebasestorage.app",
  messagingSenderId:"780676224282",
  appId:"1:780676224282:web:8580ee6c3aa1738394c8a3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* SESSION LOGIN */
let username = sessionStorage.getItem("loggedInUser");
if(!username) window.location.href="login.html";
document.getElementById("settingsUser").textContent = username;

/* SIDEBAR TOGGLE */
function toggleSidebar(){
  const sb = document.getElementById("sidebar");
  sb.classList.toggle("collapsed");
  document.querySelector(".content").style.marginLeft = sb.classList.contains("collapsed")?"60px":"250px";
}

/* NAVIGATION */
function highlightNav(id){
  ["navInbox","navTrash","navSend","navSettings"].forEach(b=>document.getElementById(b).classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* SETTINGS FUNCTIONS */
window.loadSettings = ()=>{
  highlightNav("navSettings");
  document.getElementById("content").innerHTML = `
    <h2>Settings</h2>
    <div class="userInfo">Username: ${username}</div>
    <button class="changePass" onclick="changePassword()">Change Password</button><br>
    <button class="deleteAcc" onclick="deleteAccount()">Delete Account</button>
  `;
}

window.changePassword = async ()=>{
  let newPass = prompt("Enter new password (will be hashed SHA256 before saving):");
  if(!newPass) return;
  const msgUint8 = new TextEncoder().encode(newPass);
  const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hashHex = hashArray.map(b=>b.toString(16).padStart(2,'0')).join('');
  await updateDoc(doc(db,"users",username),{password:hashHex});
  alert("Password updated successfully!");
}

window.deleteAccount = async ()=>{
  if(!confirm("Are you sure? This will delete your account permanently!")) return;
  await deleteDoc(doc(db,"users",username));
  sessionStorage.removeItem("loggedInUser");
  alert("Account deleted. Returning to login.");
  window.location.href="login.html";
}

/* SIDEBAR NAVIGATION HANDLERS */
window.loadInbox = ()=>{ window.location.href="dashboard.html"; }
window.loadTrash = ()=>{ window.location.href="dashboard.html"; }
window.openSend = ()=>{ window.location.href="dashboard.html"; }
window.loadSettings();
</script>
</body>
</html>
