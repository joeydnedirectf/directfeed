<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings - DirectFeed</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f0f0f0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* TOP BAR */
.topBar {
    background: #1a1a1a;
    color: white;
    padding: 15px 20px;
    display: flex;
    align-items: center;
    position: relative;
}

.backBtn {
    background: #444;
    border: none;
    color: white;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 4px;
    margin-right: 20px;
}

.topBar h1 {
    flex: 1;
    text-align: center;
    font-size: 22px;
    margin: 0;
    font-weight: bold;
}

/* CONTENT */
.content {
    flex: 1;
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.userBox {
    background: white;
    padding: 20px;
    border-radius: 8px;
    border: 1px solid #ddd;
    width: 300px;
    text-align: center;
    margin-bottom: 30px;
    font-weight: bold;
    font-size: 18px;
}

/* BUTTONS */
button {
    width: 300px;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
}

.resetBtn { background: #007bff; color: white; }
.deleteBtn { background: red; color: white; }

/* RESET PASSWORD FORM */
.resetForm {
    display: none;
    flex-direction: column;
    background: white;
    padding: 20px;
    border-radius: 8px;
    width: 300px;
    margin-bottom: 20px;
    border: 1px solid #ddd;
}

.resetForm input {
    margin: 8px 0;
    padding: 10px;
    border-radius: 4px;
    border: 1px solid #ccc;
}

.resetForm button {
    margin-top: 10px;
}

#statusMsg {
    margin-top: 10px;
    font-size: 14px;
    font-weight: bold;
}

</style>
</head>
<body>

<div class="topBar">
    <button class="backBtn" id="backBtn">← Back</button>
    <h1>Settings</h1>
</div>

<div class="content">
    <div class="userBox">
        Username: <span id="settingsUser"></span>
    </div>

    <!-- Reset Password -->
    <button class="resetBtn" id="showResetBtn">Reset Password</button>
    <div class="resetForm" id="resetForm">
        <input type="password" id="newPass" placeholder="New password" required>
        <input type="password" id="confirmPass" placeholder="Retype new password" required>
        <button id="submitReset">Update Password</button>
        <div id="statusMsg"></div>
    </div>

    <!-- Delete Account -->
    <button class="deleteBtn" id="deleteAccountBtn">Delete Account</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getFirestore, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
    apiKey:"AIzaSyCnE-UOw56IASUOU_qwBcF5YsBOOml9BRY",
    authDomain:"directfeed-c3084.firebaseapp.com",
    projectId:"directfeed-c3084",
    storageBucket:"directfeed-c3084.firebasestorage.app",
    messagingSenderId:"780676224282",
    appId:"1:780676224282:web:8580ee6c3aa1738394c8a3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* SESSION LOGIN */
let username = sessionStorage.getItem("loggedInUser");
if(!username) window.location.href="login.html";
document.getElementById("settingsUser").textContent = username;

/* BACK BUTTON */
document.getElementById("backBtn").onclick = () => {
    window.location.href="dashboard.html";
}

/* SHOW/HIDE RESET FORM */
const showResetBtn = document.getElementById("showResetBtn");
const resetForm = document.getElementById("resetForm");
showResetBtn.onclick = () => {
    resetForm.style.display = resetForm.style.display === "flex" ? "none" : "flex";
}

/* RESET PASSWORD */
async function sha256(message){
    const msgUint8 = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
    return Array.from(new Uint8Array(hashBuffer)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

document.getElementById("submitReset").onclick = async () => {
    const newPass = document.getElementById("newPass").value.trim();
    const confirmPass = document.getElementById("confirmPass").value.trim();
    const status = document.getElementById("statusMsg");

    if(!newPass || !confirmPass){
        status.textContent = "Please fill both fields.";
        status.style.color = "red";
        return;
    }
    if(newPass !== confirmPass){
        status.textContent = "Passwords do not match.";
        status.style.color = "red";
        return;
    }

    try{
        const hash = await sha256(newPass);
        await updateDoc(doc(db,"users",username),{password: hash});
        status.textContent = "Password updated successfully!";
        status.style.color = "green";
        document.getElementById("newPass").value="";
        document.getElementById("confirmPass").value="";
        resetForm.style.display="none";
    } catch(err){
        console.error(err);
        status.textContent = "Error updating password.";
        status.style.color = "red";
    }
}

/* DELETE ACCOUNT */
document.getElementById("deleteAccountBtn").onclick = async () => {
    if(!confirm("Are you sure you want to delete your DirectFeed account?")) return;
    try{
        await deleteDoc(doc(db,"users",username));
        sessionStorage.removeItem("loggedInUser");
        alert("Account deleted.");
        window.location.href="login.html";
    } catch(err){
        console.error(err);
        alert("Error deleting account.");
    }
}

</script>
</body>
</html>
