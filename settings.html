<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Settings - DirectFeed</title>
<style>
  body {margin:0;font-family:Arial,sans-serif;background:#f0f0f0;}
  /* TOP BAR */
  .topBar {
    width:100%;
    background:#1a1a1a;
    color:white;
    padding:15px 0;
    text-align:center;
    font-size:24px;
    font-weight:bold;
    position:fixed;
    top:0;
    left:0;
    z-index:1000;
  }
  .backBtn {
    position:absolute;
    left:15px;
    top:15px;
    background:#444;
    color:white;
    border:none;
    padding:8px 12px;
    cursor:pointer;
    border-radius:4px;
  }

  .content {
    margin-top:70px;
    max-width:480px;
    margin-left:auto;
    margin-right:auto;
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
  }

  .usernameBox {
    background:#eee;
    padding:15px;
    font-size:18px;
    font-weight:bold;
    border-radius:6px;
    text-align:center;
    margin-bottom:20px;
  }

  .formGroup {
    margin-bottom:20px;
  }

  label {
    display:block;
    margin-bottom:5px;
    font-weight:bold;
  }

  input {
    width:100%;
    padding:10px;
    border-radius:4px;
    border:1px solid #ccc;
    font-size:16px;
  }

  button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
  }

  .resetBtn { background:#007bff; color:white; }
  .deleteBtn { background:red; color:white; }

  #statusMsg { margin-top:10px; font-size:14px; text-align:center; }

</style>
</head>
<body>

<div class="topBar">
  Settings
  <button class="backBtn" id="backBtn">← Back</button>
</div>

<div class="content">
  <div class="usernameBox" id="settingsUser">Username</div>

  <div class="formGroup">
    <label for="newPassword">New Password</label>
    <input type="password" id="newPassword" placeholder="Enter new password">
    <label for="confirmPassword">Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Retype password">
    <button class="resetBtn" id="changePassBtn">Reset Password</button>
    <div id="statusMsg"></div>
  </div>

  <div class="formGroup">
    <button class="deleteBtn" id="deleteAccBtn">Delete Account</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getFirestore, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyCnE-UOw56IASUOU_qwBcF5YsBOOml9BRY",
  authDomain:"directfeed-c3084.firebaseapp.com",
  projectId:"directfeed-c3084",
  storageBucket:"directfeed-c3084.firebasestorage.app",
  messagingSenderId:"780676224282",
  appId:"1:780676224282:web:8580ee6c3aa1738394c8a3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* SESSION LOGIN */
let username = sessionStorage.getItem("loggedInUser");
if(!username) window.location.href="login.html";
document.getElementById("settingsUser").textContent = username;

/* NAVIGATION */
document.getElementById("backBtn").addEventListener("click", ()=>{ window.location.href="dashboard.html"; });

/* RESET PASSWORD */
async function changePassword(){
  const newPass = document.getElementById("newPassword").value.trim();
  const confirmPass = document.getElementById("confirmPassword").value.trim();
  const status = document.getElementById("statusMsg");

  status.textContent = "";
  if(newPass.length<6){ status.textContent="Password too short"; status.style.color="red"; return; }
  if(newPass !== confirmPass){ status.textContent="Passwords do not match"; status.style.color="red"; return; }

  try{
    const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(newPass));
    const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b=>b.toString(16).padStart(2,'0')).join('');
    await updateDoc(doc(db,"users",username),{ password: hashHex });
    status.textContent="Password updated successfully!";
    status.style.color="green";
    document.getElementById("newPassword").value="";
    document.getElementById("confirmPassword").value="";
  } catch(e){
    console.error(e);
    status.textContent="Error updating password.";
    status.style.color="red";
  }
}
document.getElementById("changePassBtn").addEventListener("click", changePassword);

/* DELETE ACCOUNT */
async function deleteAccount(){
  if(!confirm("Are you sure you want to delete your DirectFeed account?")) return;
  try{
    await deleteDoc(doc(db,"users",username));
    sessionStorage.removeItem("loggedInUser");
    alert("Account deleted. Returning to login.");
    window.location.href="login.html";
  } catch(e){
    console.error(e);
    alert("Error deleting account.");
  }
}
document.getElementById("deleteAccBtn").addEventListener("click", deleteAccount);
</script>

</body>
</html>
