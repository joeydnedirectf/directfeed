<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DirectFeed Settings</title>
<style>
/* RESET & BODY */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { background:#f5f6fa; color:#333; display:flex; flex-direction:column; min-height:100vh; }

/* TOPBAR */
.topbar {
  width:100%; padding:15px 20px; background:#2f3640; color:white; display:flex; align-items:center; justify-content:center;
  position:fixed; top:0; left:0; z-index:1000;
}
.topbar .backBtn {
  position:absolute; left:15px; background:#00a8ff; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; color:white;
}
.topbar h1 { font-size:22px; font-weight:bold; color:white; }

/* CONTENT */
.content { flex:1; margin-top:70px; padding:25px; max-width:480px; margin-left:auto; margin-right:auto; }

/* USER BOX */
.userBox { background:white; padding:15px 20px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); text-align:center; margin-bottom:25px; }
.userBox span { font-weight:bold; font-size:18px; color:#2f3640; }

/* BUTTONS & FORMS */
.formGroup { margin-bottom:20px; display:flex; flex-direction:column; gap:10px; }
.formGroup input { padding:10px; border:1px solid #ccc; border-radius:6px; }
button { padding:10px 16px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; font-size:14px; }
.resetPassBtn { background:#00a8ff; color:white; }
.deleteAccBtn { background:#e84118; color:white; }

/* SMALL TEXT / STATUS */
#statusMsg { font-size:14px; margin-top:10px; color:#e84118; }
</style>
</head>
<body>

<div class="topbar">
  <button class="backBtn" id="backBtn">← Back</button>
  <h1>Settings</h1>
</div>

<div class="content">
  <div class="userBox">
    Username: <span id="settingsUser"></span>
  </div>

  <div class="formGroup">
    <label>New Password:</label>
    <input type="password" id="newPass" placeholder="Enter new password">
    <label>Confirm Password:</label>
    <input type="password" id="confirmPass" placeholder="Retype password">
    <button class="resetPassBtn" id="resetPassBtn">Reset Password</button>
    <div id="statusMsg"></div>
  </div>

  <div class="formGroup">
    <button class="deleteAccBtn" id="deleteAccBtn">Delete Account</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getFirestore, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyCnE-UOw56IASUOU_qwBcF5YsBOOml9BRY",
  authDomain:"directfeed-c3084.firebaseapp.com",
  projectId:"directfeed-c3084",
  storageBucket:"directfeed-c3084.firebasestorage.app",
  messagingSenderId:"780676224282",
  appId:"1:780676224282:web:8580ee6c3aa1738394c8a3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let username = sessionStorage.getItem("loggedInUser");
if(!username) window.location.href="login.html";
document.getElementById("settingsUser").textContent = username;

/* BACK BUTTON */
document.getElementById("backBtn").onclick = ()=>{ window.location.href="dashboard.html"; }

/* RESET PASSWORD */
document.getElementById("resetPassBtn").onclick = async ()=>{
  const pass=document.getElementById("newPass").value;
  const confirm=document.getElementById("confirmPass").value;
  const status=document.getElementById("statusMsg");

  if(!pass || !confirm){ status.textContent="Please fill both fields."; return; }
  if(pass!==confirm){ status.textContent="Passwords do not match."; return; }

  // Hash password
  const encoder=new TextEncoder();
  const data=encoder.encode(pass);
  const hashBuffer=await crypto.subtle.digest('SHA-256',data);
  const hashArray=Array.from(new Uint8Array(hashBuffer));
  const hashHex=hashArray.map(b=>b.toString(16).padStart(2,'0')).join('');

  try{
    await updateDoc(doc(db,"users",username),{password:hashHex});
    status.style.color="green";
    status.textContent="Password updated successfully!";
    document.getElementById("newPass").value="";
    document.getElementById("confirmPass").value="";
  }catch(err){
    console.error(err);
    status.style.color="red";
    status.textContent="Error updating password.";
  }
};

/* DELETE ACCOUNT */
document.getElementById("deleteAccBtn").onclick = async ()=>{
  if(!confirm("Are you sure you want to delete your DirectFeed account?")) return;
  try{
    await deleteDoc(doc(db,"users",username));
    sessionStorage.removeItem("loggedInUser");
    alert("Account deleted successfully.");
    window.location.href="login.html";
  }catch(err){
    console.error(err);
    alert("Error deleting account.");
  }
};
</script>
</body>
</html>
