<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>
</head>
<body>
<h2>Create Account</h2>
<input id="signupUsername" placeholder="Username"><br><br>
<input type="password" id="signupPassword" placeholder="Password"><br><br>
<button id="payButton">Pay & Create Account</button>
<div id="signupStatus" style="margin-top:10px;color:red;"></div>

<script type="module">
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";

// Optional SHA256 function (simple)
async function sha256(message) {
    const msgBuffer = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
    return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCnE-UOw56IASUOU_qwBcF5YsBOOml9BRY",
  authDomain: "directfeed-c3084.firebaseapp.com",
  databaseURL: "https://directfeed-c3084-default-rtdb.firebaseio.com",
  projectId: "directfeed-c3084",
  storageBucket: "directfeed-c3084.firebasestorage.app",
  messagingSenderId: "780676224282",
  appId: "1:780676224282:web:8580ee6c3aa1738394c8a3"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const payBtn = document.getElementById("payButton");
const statusDiv = document.getElementById("signupStatus");

payBtn.addEventListener("click", async () => {
    const username = document.getElementById("signupUsername").value.trim();
    const password = document.getElementById("signupPassword").value;

    if(!username || !password){
        statusDiv.textContent = "Fill both fields"; 
        return; 
    }

    // Check if username exists
    const userRef = doc(db,"users",username);
    const userSnap = await getDoc(userRef);
    if(userSnap.exists()){ 
        statusDiv.textContent="Username taken"; 
        return; 
    }

    // Hash password
    const hash = await sha256(password);

    // === Stripe Checkout ===
    try {
        // Call your server endpoint (Firebase Function or Node.js)
        const res = await fetch("/create-checkout-session", {
            method:"POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({username, hash})
        });
        const data = await res.json();
        const stripe = Stripe("pk_live_51T7fvUCQeEWEiwM1QZOR90GqTh41jHAKGb3HUd0CeOG8zakKRaSmIruRCcKKs68GuSLOgfXxHwEKLGngeLxaZDai00GgaECWyL");
        await stripe.redirectToCheckout({ sessionId: data.sessionId });
    } catch(e){
        console.error(e);
        statusDiv.textContent="Payment failed";
    }
});
</script>

<!-- Stripe.js -->
<script src="https://js.stripe.com/v3/"></script>
</body>
</html>
