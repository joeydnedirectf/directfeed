<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>
</head>
<body>
<h2>Create Account (Free)</h2>
<input id="signupUsername" placeholder="Username"><br><br>
<input type="password" id="signupPassword" placeholder="Password"><br><br>
<button id="createAccountBtn">Create Account</button>
<div id="signupStatus" style="margin-top:10px;color:red;"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.4.0/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  piKey: "AIzaSyCnE-UOw56IASUOU_qwBcF5YsBOOml9BRY",
  authDomain: "directfeed-c3084.firebaseapp.com",
  databaseURL: "https://directfeed-c3084-default-rtdb.firebaseio.com",
  projectId: "directfeed-c3084",
  storageBucket: "directfeed-c3084.firebasestorage.app",
  messagingSenderId: "780676224282",
  appId: "1:780676224282:web:8580ee6c3aa1738394c8a3"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// SHA256 hash
async function sha256(msg){
  const buf = new TextEncoder().encode(msg);
  const hashBuffer = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b => b.toString(16).padStart(2,'0'))
    .join('');
}

const btn = document.getElementById("createAccountBtn");
const status = document.getElementById("signupStatus");

btn.addEventListener("click", async () => {
  const username = document.getElementById("signupUsername").value.trim();
  const password = document.getElementById("signupPassword").value;

  if(!username || !password){ status.textContent="Fill both fields"; return; }

  const userRef = doc(db,"users",username);
  const userSnap = await getDoc(userRef);
  if(userSnap.exists()){ status.textContent="Username taken"; return; }

  const hash = await sha256(password);
  await setDoc(userRef, { password: hash });

  alert("Account created! You can now login.");
  window.location.href="login.html";
});
</script>
</body>
</html>
